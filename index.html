            </select>
          </div>
          <input style={{...inp,marginBottom:16}} type="number" min={1} max={31} placeholder="Giorno del mese (es. 1)" value={recForm.dayOfMonth||""} onChange={e=>setRecForm(f=>({...f,dayOfMonth:e.target.value===""?"":Number(e.target.value)}))}/>
          <div style={{fontSize:12,color:C.muted,marginBottom:4}}>Data inizio</div>
          <input style={{...inp,marginBottom:16}} type="date" value={recForm.startDate||today.toISOString().slice(0,10)} onChange={e=>setRecForm(f=>({...f,startDate:e.target.value}))}/>          <Btn bg={C.honey} color={C.text} onClick={addRec}>{editingRec?"Salva modifiche":"Aggiungi ricorrente"}</Btn>
        </Modal>
      )}

      {/* Obiettivo */}
      {modal==="addGoal" && (
        <Modal title={editingGoal?"Modifica obiettivo":"Nuovo obiettivo"} onClose={()=>setModal(null)}>
          <input style={{...inp,marginBottom:12}} placeholder="Nome obiettivo (es. Vacanza)" value={goalForm.name} onChange={e=>setGoalForm(f=>({...f,name:e.target.value}))}/>
          <input style={{...inp,marginBottom:12}} type="number" placeholder="Obiettivo totale € (opzionale)" value={goalForm.target} onChange={e=>setGoalForm(f=>({...f,target:e.target.value}))}/>
          <div style={{fontSize:12,color:C.muted,marginBottom:6}}>Colore</div>
          <div style={{display:"flex",gap:8,marginBottom:16}}>
            {GOAL_COLORS.map(col=>(
              <div key={col} onClick={()=>setGoalForm(f=>({...f,color:col}))} style={{width:32,height:32,borderRadius:"50%",background:col,cursor:"pointer",border:goalForm.color===col?"3px solid #444":"3px solid transparent"}}/>
            ))}
          </div>
          <div style={{background:C.bg,borderRadius:14,padding:14,marginBottom:14}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:goalForm.autoMonthly?14:0}}>
              <span style={{fontSize:14,fontWeight:600,color:C.text}}>🔁 Versamento automatico</span>
              <Toggle on={goalForm.autoMonthly} onToggle={()=>setGoalForm(f=>({...f,autoMonthly:!f.autoMonthly}))}/>
            </div>
            {goalForm.autoMonthly&&(
              <>
                <input style={{...inp,marginBottom:8}} type="number" placeholder="Importo €" value={goalForm.monthlyAmount} onChange={e=>setGoalForm(f=>({...f,monthlyAmount:e.target.value}))}/>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
                  <span style={{fontSize:13,color:C.muted,flexShrink:0}}>Ogni</span>
                  <input style={{...inp,width:52,padding:"9px 8px",textAlign:"center",marginBottom:0}} type="number" min={1} placeholder="1"
                    value={goalForm.monthlyInterval||""} onChange={e=>setGoalForm(f=>({...f,monthlyInterval:e.target.value===""?"":Number(e.target.value)}))}/>
                  <select style={{...inp,flex:1,marginBottom:0}} value={goalForm.monthlyFrequency||"month"} onChange={e=>setGoalForm(f=>({...f,monthlyFrequency:e.target.value}))}>
                    {FREQ_OPTIONS.map(f=><option key={f.value} value={f.value}>{f.label}</option>)}
                  </select>
                </div>
                <div style={{fontSize:12,color:C.muted,marginBottom:4}}>Giorno del mese</div>
                <input style={inp} type="number" min={1} max={31} value={goalForm.monthlyDay} onChange={e=>setGoalForm(f=>({...f,monthlyDay:Number(e.target.value)}))}/>
              </>
            )}
          </div>
          <Btn onClick={addGoal}>{editingGoal?"Salva modifiche":"Crea obiettivo"}</Btn>
        </Modal>
      )}

      {/* Versa in obiettivo */}
      {modal==="depositGoal"&&depositGoal&&(
        <Modal title={`Versa in "${depositGoal.goal.name}"`} onClose={()=>setModal(null)}>
          <div style={{background:C.bg,borderRadius:14,padding:14,marginBottom:16,fontSize:14,color:C.muted}}>
            L'importo verrà scalato dal saldo del mese corrente e aggiunto all'obiettivo.
          </div>
          <input style={{...inp,marginBottom:16}} type="number" placeholder="Importo €" value={depositGoal.amount} onChange={e=>setDepositGoal(d=>({...d,amount:e.target.value}))}/>
          <Btn bg={depositGoal.goal.color||GOAL_COLORS[0]} color={C.text} onClick={doDeposit}>Versa {depositGoal.amount?`${depositGoal.amount}€`:""}</Btn>
        </Modal>
      )}

      {modal==="confirmRec"&&confirmRec&&(
        <Modal title="Modifica movimento ricorrente" onClose={()=>setModal(null)}>
          <input style={{...inp,marginBottom:10}} type="number" placeholder={`Importo (attuale: ${confirmRec.tx.amount}€)`} value={confirmRec.newAmount||""} onChange={e=>setConfirmRec(c=>({...c,newAmount:e.target.value}))}/>
          <input style={{...inp,marginBottom:10}} type="date" value={confirmRec.newDate||confirmRec.tx.date} onChange={e=>setConfirmRec(c=>({...c,newDate:e.target.value}))}/>
          <div style={{fontSize:12,color:C.muted,marginBottom:6}}>Categoria</div>
          <CategoryPicker
            categories={categories} setCategories={setCategories}
            type={confirmRec.tx.type}
            value={confirmRec.newCategory!==undefined?confirmRec.newCategory:confirmRec.tx.category||""}
            onChange={v=>setConfirmRec(c=>({...c,newCategory:v,newTag:""}))}
            tagValue={confirmRec.newTag!==undefined?confirmRec.newTag:confirmRec.tx.tag||""}
            onTagChange={v=>setConfirmRec(c=>({...c,newTag:v}))}
          />
          <input style={{...inp,marginBottom:16}} type="text" placeholder={`Nota (attuale: ${confirmRec.tx.note||"—"})`} value={confirmRec.newNote||""} onChange={e=>setConfirmRec(c=>({...c,newNote:e.target.value}))}/>
          <div style={{display:"flex",gap:8,marginTop:4}}>
            <button onClick={()=>{
              setTransactions(prev=>prev.filter(t=>t.id!==confirmRec.tx.id));
              setConfirmRec(null); setModal(null);
            }} style={{background:"#FDF2F2",border:"none",borderRadius:14,padding:"13px 14px",fontSize:18,cursor:"pointer",flexShrink:0}}>🗑️</button>
            <button onClick={()=>{
              const rec=recurring.find(r=>r.id===confirmRec.tx.recurringId);
              if(rec) setRecurring(prev=>prev.map(r=>r.id===rec.id?{...r,
                amount:Number(confirmRec.newAmount||r.amount),
                category:confirmRec.newCategory!==undefined?confirmRec.newCategory:r.category,
                tag:confirmRec.newTag!==undefined?confirmRec.newTag:r.tag,
                note:confirmRec.newNote||r.note}:r));
              setConfirmRec(null); setModal(null);
            }} style={{flex:1,background:C.sage,color:"#fff",border:"none",borderRadius:14,padding:"13px",fontWeight:700,fontFamily:"inherit",fontSize:14,cursor:"pointer"}}>Future</button>
            <button onClick={()=>{
              setTransactions(prev=>prev.map(t=>t.id===confirmRec.tx.id?{...t,
                amount:Number(confirmRec.newAmount||t.amount),
                date:confirmRec.newDate||t.date,
                category:confirmRec.newCategory!==undefined?confirmRec.newCategory:t.category,
                tag:confirmRec.newTag!==undefined?confirmRec.newTag:t.tag,
                note:confirmRec.newNote||t.note}:t));
              setConfirmRec(null); setModal(null);
            }} style={{flex:1,background:C.sky,color:"#fff",border:"none",borderRadius:14,padding:"13px",fontWeight:700,fontFamily:"inherit",fontSize:14,cursor:"pointer"}}>Corrente</button>
          </div>
        </Modal>
      )}

      {/* Mini modal tag categoria */}
      {selectedSlice&&(
        <Modal title={selectedSlice.label} onClose={()=>setSelectedSlice(null)}>
          {Object.keys(selectedSlice.tags||{}).length===0
            ? <div style={{color:C.muted,fontSize:14,textAlign:"center",padding:"20px 0"}}>Nessun tag per questa categoria</div>
            : (()=>{
                const tags=Object.entries(selectedSlice.tags);
                const shades=colorShades(selectedSlice.color,tags.length);
                const total=tags.reduce((s,[,v])=>s+v,0);
                return (
                  <>
                    <div style={{display:"flex",justifyContent:"center",marginBottom:16}}>
                      <PieChart
                        data={tags.map(([label,value],i)=>({label,value,color:shades[i]}))}
                        size={200}
                        centerLabel={selectedSlice.label}
                        centerValue={fmt(selectedSlice.value)+"€"}
                      />
                    </div>
                    {tags.map(([label,value],i)=>(
                      <div key={label} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 0",borderBottom:`1px solid ${C.border}`}}>
                        <div style={{width:10,height:10,borderRadius:3,background:shades[i],flexShrink:0}}/>
                        <span style={{flex:1,fontSize:14,fontWeight:600,color:C.text}}>{label}</span>
                        <span style={{fontSize:12,color:C.muted}}>{Math.round(value/total*100)}%</span>
                        <span style={{fontSize:14,fontWeight:700,color:C.text}}>{fmt(value)}€</span>
                      </div>
                    ))}
                  </>
                );
              })()
          }
        </Modal>
      )}

      {/* Sankey Modal */}
      {modal==="sankey" && (()=>{
        const W=320, PAD=6, nodeW=9;
        const catTotal = pieData.reduce((s,d)=>s+d.value,0)||1;
        const availH = Math.max(400, pieData.length*55+60);
        const totalGaps = (pieData.length-1)*5;
        const usableH = availH - totalGaps - PAD*2;
        const incH = availH - PAD*2;
        let catY = PAD;
        const catNodes = pieData.map((d,i)=>{
          const h = Math.max(((d.value/catTotal)*usableH), 14);
          const node = {...d, x:W*0.38, y:catY, h, color:d.color||PIE_COLORS[i%PIE_COLORS.length]};
          catY += h + 5;
          return node;
        });
        const totalCatH = catY - 5 - PAD;
        const tagNodes = [];
        catNodes.forEach(cat=>{
          const tags = Object.entries(cat.tags||{});
          if(tags.length===0){
            tagNodes.push({label:cat.label,value:cat.value,catColor:cat.color,x:W*0.70,y:cat.y,h:cat.h,cat:cat.label});
          } else {
            let ty = cat.y;
            tags.forEach(([tag,val])=>{
              const th = Math.max((val/cat.value)*cat.h, 8);
              tagNodes.push({label:tag,value:val,catColor:cat.color,x:W*0.70,y:ty,h:Math.min(th,cat.h),cat:cat.label});
              ty += Math.min(th,cat.h) + 3;
            });
          }
        });
        const sankeyPath = (x1,y1,h1,x2,y2,h2) => {
          const mx = (x1+x2)/2;
          return `M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2} L${x2},${y2+h2} C${mx},${y2+h2} ${mx},${y1+h1} ${x1},${y1+h1} Z`;
        };
        return (
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:200}} onClick={()=>setModal(null)}>
            <div style={{position:"fixed",bottom:0,left:0,right:0,height:"calc(100vh - 60px)",background:C.card,borderRadius:"24px 24px 0 0",overflowY:"scroll",WebkitOverflowScrolling:"touch",padding:"20px 12px 40px"}} onClick={e=>e.stopPropagation()}>
              <div style={{width:36,height:4,background:C.border,borderRadius:2,margin:"0 auto 14px"}}/>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <span style={{fontWeight:700,fontSize:16,color:C.text}}>📊 Sankey — {MONTHS[month]} {year}</span>
                <button onClick={()=>setModal(null)} style={{background:C.border,border:"none",width:28,height:28,borderRadius:"50%",cursor:"pointer",fontSize:16,color:C.muted}}>×</button>
              </div>
              {pieData.length===0
                ? <div style={{textAlign:"center",color:C.muted,padding:"40px 0"}}>Nessuna spesa questo mese</div>
                : <div style={{padding:"0 2px"}}>
                  <svg width="100%" viewBox={`-4 -4 ${W+8} ${availH+24}`} style={{display:"block",margin:"0 auto",height:"auto",maxHeight:"calc(100vh - 150px)"}}>
                    {/* Entrate */}
                    <rect x={PAD} y={PAD} width={nodeW} height={incH} rx={4} fill={C.income}/>
                    <text x={PAD+nodeW+4} y={PAD+incH/2-5} dominantBaseline="middle" fontSize={7} fontWeight="700" fill={C.text} fontFamily="DM Sans">Entrate</text>
                    <text x={PAD+nodeW+4} y={PAD+incH/2+5} dominantBaseline="middle" fontSize={6} fill={C.muted} fontFamily="DM Sans">{fmt(totalIncome)}€</text>
                    {catNodes.map((cat,i)=>{
                      const srcY = PAD+(cat.y-PAD)*(incH/totalCatH);
                      const srcH = cat.h*(incH/totalCatH);
                      const midY = cat.y + cat.h/2;
                      return <g key={i}>
                        <path d={sankeyPath(PAD+nodeW,srcY,srcH,cat.x,cat.y,cat.h)} fill={cat.color} opacity={0.2}/>
                        <rect x={cat.x} y={cat.y} width={nodeW} height={cat.h} rx={2} fill={cat.color}/>
                        <text x={cat.x+nodeW+3} y={midY-3} fontSize={6} fontWeight="700" fill={C.text} fontFamily="DM Sans">{cat.label.length>14?cat.label.slice(0,13)+"…":cat.label}</text>
                        <text x={cat.x+nodeW+3} y={midY+5} fontSize={5.5} fill={C.muted} fontFamily="DM Sans">{fmt(cat.value)}€</text>
                      </g>;
                    })}
                    {tagNodes.map((tag,i)=>{
                      const cat=catNodes.find(c=>c.label===tag.cat);
                      if(!cat) return null;
                      const midY = tag.y + tag.h/2;
                      return <g key={i}>
                        <path d={sankeyPath(cat.x+nodeW,tag.y,tag.h,tag.x,tag.y,tag.h)} fill={tag.catColor} opacity={0.15}/>
                        <rect x={tag.x} y={tag.y} width={nodeW} height={tag.h} rx={2} fill={tag.catColor} opacity={0.75}/>
                        <text x={tag.x+nodeW+3} y={midY-3} fontSize={6} fontWeight="600" fill={C.text} fontFamily="DM Sans">{tag.label.length>16?tag.label.slice(0,15)+"…":tag.label}</text>
                        <text x={tag.x+nodeW+3} y={midY+5} fontSize={5.5} fill={C.muted} fontFamily="DM Sans">{fmt(tag.value)}€</text>
                      </g>;
                    })}
                  </svg>
                  <div style={{fontSize:12,color:C.muted,textAlign:"center",marginTop:12}}>
                    {Math.round((catTotal/Math.max(totalIncome,1))*100)}% delle entrate speso · bilancio {balance>=0?"+":""}{fmt(balance)}€
                  </div>
                </div>
              }
            </div>
          </div>
        );
      })()}

      {/* Conferma previsto */}
      {modal==="confirmPreview"&&confirmPreview&&(()=>{
        const r = confirmPreview.rec;
        const viewKey = `${year}-${month}`;
        const confirm = () => {
          setTransactions(prev=>[...prev,{
            id:uid(), recurringId:r.id, recurringMonth:viewKey,
            type:r.type, amount:Number(confirmPreview.amount||r.amount),
            category:r.category, tag:r.tag,
            note:confirmPreview.note||r.note,
            date:confirmPreview.date||today.toISOString().slice(0,10)
          }]);
          setConfirmPreview(null); setModal(null);
        };
        const skip = () => {
          // Segna come saltato così non viene reinserito automaticamente
          setTransactions(prev=>[...prev,{
            id:uid(), recurringId:r.id, recurringMonth:viewKey,
            type:r.type, amount:0, skipped:true,
            category:r.category, tag:r.tag, note:"",
            date:today.toISOString().slice(0,10)
          }]);
          setConfirmPreview(null); setModal(null);
        };
        return (
          <Modal title="Previsto" onClose={()=>setModal(null)}>
            <div style={{background:C.bg,borderRadius:14,padding:12,marginBottom:16}}>
              <div style={{fontSize:14,fontWeight:600,color:C.text,marginBottom:2}}>🔁 {r.category}{r.tag?` · ${r.tag}`:""}</div>
              <div style={{fontSize:12,color:C.muted}}>Previsto giorno {r.dayOfMonth} · {r.type==="income"?"+":"-"}{fmt(r.amount)}€</div>
            </div>
            <input style={{...inp,marginBottom:10}} type="number" placeholder={`Importo (${fmt(r.amount)}€)`}
              value={confirmPreview.amount} onChange={e=>setConfirmPreview(c=>({...c,amount:e.target.value}))}/>
            <input style={{...inp,marginBottom:10}} type="text" placeholder={`Nota${r.note?` (${r.note})`:""}`}
              value={confirmPreview.note} onChange={e=>setConfirmPreview(c=>({...c,note:e.target.value}))}/>
            <input style={{...inp,marginBottom:16}} type="date"
              value={confirmPreview.date||today.toISOString().slice(0,10)}
              onChange={e=>setConfirmPreview(c=>({...c,date:e.target.value}))}/>
            <div style={{display:"flex",gap:8}}>
              <button onClick={skip} title="Elimina questa occorrenza" style={{background:"#FDF2F2",border:"none",borderRadius:14,padding:"13px 16px",fontSize:18,cursor:"pointer",flexShrink:0}}>🗑️</button>
              <Btn onClick={confirm} style={{flex:1}}>✓ Conferma</Btn>
            </div>
          </Modal>
        );
      })()}

      {/* Nota mese */}
      {modal==="monthNote"&&(()=>{
        const noteKey=`${year}-${month}`;
        return (
          <Modal title={`📝 ${MONTHS[month]} ${year}`} onClose={()=>setModal(null)}>
            <textarea
              style={{...inp,minHeight:100,resize:"vertical",marginBottom:16,lineHeight:1.5}}
              placeholder="Scrivi una nota per questo mese... (es. mese di vacanze, spese straordinarie)"
              value={monthNotes[noteKey]||""}
              onChange={e=>setMonthNotes(prev=>e.target.value?{...prev,[noteKey]:e.target.value}:Object.fromEntries(Object.entries(prev).filter(([k])=>k!==noteKey)))}
            />
            <Btn onClick={()=>setModal(null)}>Fatto</Btn>
            {monthNotes[noteKey]&&<Btn bg="#FDF2F2" color={C.expense} onClick={()=>{setMonthNotes(prev=>Object.fromEntries(Object.entries(prev).filter(([k])=>k!==noteKey)));setModal(null);}} style={{marginTop:8}}>Elimina nota</Btn>}
          </Modal>
        );
      })()}

      {/* Budget */}
      {modal==="addBudget" && (()=>{
        const availableCats = categories.filter(c=>c.type==="expense"&&!budgets[c.name]);
        return (
          <Modal title="Nuovo budget mensile" onClose={()=>setModal(null)}>
            {availableCats.length===0
              ? <div style={{color:C.muted,fontSize:14,textAlign:"center",padding:"20px 0"}}>Hai già impostato un budget per tutte le categorie!</div>
              : <>
                  <div style={{fontSize:12,color:C.muted,marginBottom:8}}>Categoria</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:16}}>
                    {availableCats.map((c,i)=>{
                      const col=PIE_COLORS[categories.filter(x=>x.type==="expense").findIndex(x=>x.id===c.id)%PIE_COLORS.length];
                      const sel=budgetForm?.cat===c.name;
                      return (
                        <button key={c.id} onClick={()=>setBudgetForm(f=>({...f,cat:c.name}))}
                          style={{padding:"7px 14px",borderRadius:20,border:"none",cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:600,
                            background:sel?col:C.border, color:sel?"#fff":C.text,
                            boxShadow:sel?`0 2px 8px ${col}66`:"none"}}>
                          {c.name}
                        </button>
                      );
                    })}
                  </div>
                  <div style={{fontSize:12,color:C.muted,marginBottom:8}}>Limite mensile</div>
                  <div style={{display:"flex",gap:8,marginBottom:16}}>
                    <input style={{...inp,flex:1,marginBottom:0}} type="number" placeholder="es. 300"
                      value={budgetForm?.amount||""}
                      onChange={e=>setBudgetForm(f=>({...f,amount:e.target.value}))}/>
                    <button onClick={()=>{
                      if(!budgetForm?.cat||!budgetForm?.amount||isNaN(budgetForm.amount)) return;
                      setBudgets(prev=>({...prev,[budgetForm.cat]:Number(budgetForm.amount)}));
                      setBudgetForm({cat:"",amount:""});
                      setModal(null);
                    }} style={{background:C.sage,color:"#fff",border:"none",borderRadius:12,padding:"0 18px",fontWeight:700,fontFamily:"inherit",fontSize:14,cursor:"pointer"}}>Salva</button>
                  </div>
                </>
            }
          </Modal>
        );
      })()}

      {/* Nome app */}
      {modal==="editName" && (
        <Modal title="Nome dell'app" onClose={()=>setModal(null)}>
          <div style={{fontSize:13,color:C.muted,marginBottom:12}}>Questo nome appare nell'header — personalizzalo come vuoi!</div>
          <input
            style={{...inp,marginBottom:16,fontSize:17,fontWeight:600}}
            placeholder="Es. MoneThina"
            value={appName}
            onChange={e=>setAppName(e.target.value)}
            maxLength={20}
          />
          <Btn onClick={()=>setModal(null)}>Salva</Btn>
        </Modal>
      )}
    </div>
  );
}

const {useState,useEffect,useRef}=React;
const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
  <script>
    if('serviceWorker' in navigator){
      window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js'));
    }
  </script>
</body>
</html>
