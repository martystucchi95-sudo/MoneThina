const GOAL_COLORS = ["#E8C4C4","#F0D080","#A8C4D8","#C8B4D8","#A8C5A0","#F0C4A0"];

const load = (k,d) => { try { const v=localStorage.getItem(k); return v?JSON.parse(v):d; } catch { return d; } };
const save = (k,v) => { try { localStorage.setItem(k,JSON.stringify(v)); } catch {} };

const fmt = n => Number(n).toLocaleString("it-IT",{minimumFractionDigits:2,maximumFractionDigits:2});

// ── IndexedDB per persistenza robusta ────────────────────────────────────────
const DB_NAME = "MoneThina", DB_VERSION = 1, STORE = "data";
let _db = null;

function openDB() {
  if(_db) return Promise.resolve(_db);
  return new Promise((res,rej)=>{
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => e.target.result.createObjectStore(STORE);
    req.onsuccess = e => { _db=e.target.result; res(_db); };
    req.onerror = e => rej(e);
  });
}

function idbSave(key, value) {
  // Salva sia in localStorage (veloce) che in IndexedDB (persistente)
  save(key, value);
  openDB().then(db=>{
    const tx = db.transaction(STORE,"readwrite");
    tx.objectStore(STORE).put(JSON.stringify(value), key);
  }).catch(()=>{});
}

function idbLoad(key, def) {
  // Prima prova localStorage, poi IndexedDB come fallback
  const ls = load(key, null);
  if(ls !== null) return Promise.resolve(ls);
  return openDB().then(db=>new Promise((res)=>{
    const req = db.transaction(STORE,"readonly").objectStore(STORE).get(key);
    req.onsuccess = e => {
      const v = e.target.result;
      if(v) { try { const parsed=JSON.parse(v); save(key,parsed); res(parsed); } catch { res(def); } }
      else res(def);
    };
    req.onerror = () => res(def);
  })).catch(()=>def);
}

// Calcola sfumature di un colore base per i tag
function colorShades(hex, n) {
  if (n===0) return [];
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return Array.from({length:n},(_,i)=>{
    const t = n===1 ? 0.5 : i/(n-1);
    const factor = 0.55 + t*0.45;
    const rr=Math.round(Math.min(255,r+(255-r)*(1-factor)));
    const gg=Math.round(Math.min(255,g+(255-g)*(1-factor)));
    const bb=Math.round(Math.min(255,b+(255-b)*(1-factor)));
    return `#${rr.toString(16).padStart(2,"0")}${gg.toString(16).padStart(2,"0")}${bb.toString(16).padStart(2,"0")}`;
  });
}

// ─── PIE GRANDE con label dentro ────────────────────────────────────────────
function PieChart({ data, onSliceClick, centerLabel, centerValue, size=240 }) {
  const R = size/2;
  const r = R * 0.52;        // raggio interno donut
  const rLabel = R * 0.88;   // label più verso l'esterno
  const total = data.reduce((s,d)=>s+d.value,0);

  if (!data.length||!total) return (
    <div style={{width:size,height:size,borderRadius:"50%",background:C.border,display:"flex",alignItems:"center",justifyContent:"center",color:C.muted,fontSize:13}}>Nessun dato</div>
  );

  if (data.length===1) return (
    <svg width={size} height={size} style={{cursor:"pointer"}} onClick={()=>onSliceClick&&onSliceClick(data[0])}>
      <circle cx={R} cy={R} rx={R-2} ry={R-2} r={R-2} fill={data[0].color||PIE_COLORS[0]}/>
      <circle cx={R} cy={R} r={r} fill={C.card}/>
      <text x={R} y={R-8} textAnchor="middle" fontSize={11} fill={C.muted} fontFamily="DM Sans">{centerLabel||data[0].label}</text>
      <text x={R} y={R+12} textAnchor="middle" fontSize={15} fontWeight="700" fill={C.text} fontFamily="DM Sans">{centerValue||fmt(data[0].value)+"€"}</text>
    </svg>
  );

  let cum = -Math.PI/2;
  const slices = data.map((d,i)=>{
    const a=(d.value/total)*2*Math.PI;
    const midA = cum + a/2;
    const x1=R+( R-2)*Math.cos(cum), y1=R+(R-2)*Math.sin(cum);
    cum+=a;
    const x2=R+(R-2)*Math.cos(cum), y2=R+(R-2)*Math.sin(cum);
    const lx=R+rLabel*Math.cos(midA), ly=R+rLabel*Math.sin(midA);
    const pct=Math.round((d.value/total)*100);
    return {
      ...d,
      path:`M${R},${R} L${x1},${y1} A${R-2},${R-2} 0 ${a>Math.PI?1:0},1 ${x2},${y2} Z`,
      color: d.color||(PIE_COLORS[i%PIE_COLORS.length]),
      lx, ly, pct, angle: a,
    };
  });

  return (
    <svg width={size} height={size} viewBox={`-20 -20 ${size+40} ${size+40}`} overflow="visible">
      {slices.map((s,i)=>(
        <path key={i} d={s.path} fill={s.color} stroke="#fff" strokeWidth={2}
          style={{cursor:onSliceClick?"pointer":"default",transition:"opacity 0.15s"}}
          onClick={()=>onSliceClick&&onSliceClick(s)}
          onMouseEnter={e=>e.target.style.opacity=0.82}
          onMouseLeave={e=>e.target.style.opacity=1}
        />
      ))}
      <circle cx={R} cy={R} r={r} fill={C.card}/>
      {/* Label centro */}
      <text x={R} y={R-10} textAnchor="middle" fontSize={12} fill={C.muted} fontFamily="DM Sans, sans-serif">{centerLabel||"Totale"}</text>
      <text x={R} y={R+14} textAnchor="middle" fontSize={16} fontWeight="700" fill={C.text} fontFamily="DM Sans, sans-serif">{centerValue||fmt(total)+"€"}</text>
      {/* Label su tutte le fette — posizione fuori dal donut, testo nero */}
      {slices.map((s,i)=>(
        <g key={i} style={{pointerEvents:"none"}}>
          <text x={s.lx} y={s.ly-5} textAnchor="middle" fontSize={9} fontWeight="700" fill={C.text} fontFamily="DM Sans, sans-serif"
            style={{textShadow:"0 0 3px #fff"}}>
            {s.label.length>8?s.label.slice(0,7)+"…":s.label}
          </text>
          <text x={s.lx} y={s.ly+7} textAnchor="middle" fontSize={8} fill="#555" fontFamily="DM Sans, sans-serif">
            {s.pct}%
          </text>
        </g>
      ))}
    </svg>
  );
}

// ─── CATEGORY PICKER ────────────────────────────────────────────────────────
function CategoryPicker({ categories, setCategories, type, value, onChange, tagValue, onTagChange }) {
  const [addingCat, setAddingCat] = useState(false);
  const [newCatName, setNewCatName] = useState("");
  const [addingTag, setAddingTag] = useState(false);
  const [newTagName, setNewTagName] = useState("");

  const catOptions = categories.filter(c=>c.type===type);
  const selCat = categories.find(c=>c.name===value&&c.type===type);
  const tagOptions = selCat?.tags||[];
  const INCOME_COLORS = ["#8DB88A","#6AAF66","#4E9E4A","#72C46E","#A8D8A4","#5EBE5A"];
  const catColor = (cat) => {
    const idx = categories.filter(c=>c.type===type).findIndex(c=>c.id===cat.id);
    if(type==="income") return INCOME_COLORS[idx % INCOME_COLORS.length];
    return PIE_COLORS[idx % PIE_COLORS.length];
  };

  const createCat = () => {
    if (!newCatName.trim()) return;
    const nc = {id:uid(),name:newCatName.trim(),type,tags:[]};
    setCategories(prev=>[...prev,nc]);
    onChange(nc.name); onTagChange("");
    setNewCatName(""); setAddingCat(false);
  };
  const createTag = () => {
    if (!newTagName.trim()||!selCat) return;
    setCategories(prev=>prev.map(c=>c.id===selCat.id?{...c,tags:[...c.tags,newTagName.trim()]}:c));
    onTagChange(newTagName.trim());
    setNewTagName(""); setAddingTag(false);
  };

  const selColor = selCat ? catColor(selCat) : C.sage;

  return (
    <div style={{marginBottom:12}}>
      <div style={{display:"flex",gap:8,marginBottom:8,flexWrap:"wrap"}}>
        {catOptions.map(c=>{
          const col = catColor(c);
          const sel = value===c.name;
          return (
            <button key={c.id} onClick={()=>{onChange(c.name);onTagChange("");}}
              style={{padding:"7px 13px",borderRadius:20,border:"none",cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:600,
                background: sel ? col : C.border,
                color: sel ? "#fff" : C.text,
                boxShadow: sel ? `0 2px 8px ${col}66` : "none",
              }}>{c.name}</button>
          );
        })}
        {addingCat ? (
          <div style={{display:"flex",gap:6,width:"100%"}}>
            <input autoFocus style={{...inp,flex:1,padding:"7px 11px",fontSize:13}} placeholder="Nome categoria" value={newCatName} onChange={e=>setNewCatName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&createCat()}/>
            <button onClick={createCat} style={{background:C.sage,color:"#fff",border:"none",borderRadius:10,padding:"0 12px",cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>✓</button>
            <button onClick={()=>setAddingCat(false)} style={{background:C.border,border:"none",borderRadius:10,padding:"0 10px",cursor:"pointer"}}>✕</button>
          </div>
        ) : (
          <button onClick={()=>setAddingCat(true)} style={{padding:"7px 13px",borderRadius:20,border:`1.5px dashed ${C.sage}`,cursor:"pointer",fontFamily:"inherit",fontSize:13,color:C.sage,background:"transparent"}}>+ categoria</button>
        )}
      </div>
      {value && (
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {tagOptions.map(t=>{
            const sel = tagValue===t;
            return (
              <button key={t} onClick={()=>onTagChange(sel?"":t)}
                style={{padding:"5px 11px",borderRadius:20,border:"none",cursor:"pointer",fontFamily:"inherit",fontSize:12,
                  background: sel ? selColor+"33" : C.border,
                  color: sel ? selColor : C.muted,
                  fontWeight: sel ? 700 : 400,
                  border: sel ? `1.5px solid ${selColor}` : "1.5px solid transparent",
                }}>{t}</button>
            );
          })}
          {addingTag ? (
            <div style={{display:"flex",gap:6}}>
              <input autoFocus style={{...inp,width:120,padding:"5px 9px",fontSize:12}} placeholder="Nuovo tag" value={newTagName} onChange={e=>setNewTagName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&createTag()}/>
              <button onClick={createTag} style={{background:C.sky,color:"#fff",border:"none",borderRadius:10,padding:"0 10px",cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>✓</button>
              <button onClick={()=>setAddingTag(false)} style={{background:C.border,border:"none",borderRadius:10,padding:"0 8px",cursor:"pointer"}}>✕</button>
            </div>
          ) : (
            <button onClick={()=>setAddingTag(true)} style={{padding:"5px 11px",borderRadius:20,border:`1.5px dashed ${selColor}`,cursor:"pointer",fontFamily:"inherit",fontSize:12,color:selColor,background:"transparent"}}>+ tag</button>
          )}
        </div>
      )}
    </div>
  );
}

// ─── MAIN ───────────────────────────────────────────────────────────────────
function App() {
  const today = new Date();
  const [tab, setTab] = useState("home");
  const [month, setMonth] = useState(today.getMonth());
  const [year, setYear] = useState(today.getFullYear());
  const [pieView, setPieView] = useState(0);
  const [selectedSlice, setSelectedSlice] = useState(null);
  const [searchQuery, setSearchQuery] = useState("");
  const [searchScope, setSearchScope] = useState("month");
  const [searchOpen, setSearchOpen] = useState(false);
  const [monthPickerOpen, setMonthPickerOpen] = useState(false);
  const [trendCat, setTrendCat] = useState("");
  const [trendTag, setTrendTag] = useState("");
  const [trendTooltip, setTrendTooltip] = useState(null);
  const [barTooltip, setBarTooltip] = useState(null);
  const [annualChartType, setAnnualChartType] = useState("bar"); // "bar" | "line"
  const [budgetForm, setBudgetForm] = useState({cat:"",amount:""});
  const [modal, setModal] = useState(null);

  const [transactions, setTransactions] = useState(()=>load("rspr3_tx",[]));
  const [recurring, setRecurring]       = useState(()=>load("rspr3_rec",[]));
  const [goals, setGoals]               = useState(()=>load("rspr3_goals",[]));
  const [categories, setCategories]     = useState(()=>load("rspr3_cats",[]));
  const [appName, setAppName]           = useState(()=>load("rspr3_appname","MoneThina"));
  const [budgets, setBudgets]           = useState(()=>load("rspr3_budgets",{}));
  const [monthNotes, setMonthNotes]     = useState(()=>load("rspr3_notes",{}));

  useEffect(()=>idbSave("rspr3_tx",transactions),[transactions]);
  useEffect(()=>idbSave("rspr3_rec",recurring),[recurring]);
  useEffect(()=>idbSave("rspr3_goals",goals),[goals]);
  useEffect(()=>idbSave("rspr3_cats",categories),[categories]);
  useEffect(()=>idbSave("rspr3_appname",appName),[appName]);
  useEffect(()=>idbSave("rspr3_budgets",budgets),[budgets]);
  useEffect(()=>idbSave("rspr3_notes",monthNotes),[monthNotes]);

  // Recovery da IndexedDB se localStorage è vuoto (es. dopo svuotamento cache)
  useEffect(()=>{
    const keys = ["rspr3_tx","rspr3_rec","rspr3_goals","rspr3_cats","rspr3_appname","rspr3_budgets","rspr3_notes"];
    const setters = [setTransactions,setRecurring,setGoals,setCategories,setAppName,setBudgets,setMonthNotes];
    const defaults = [[],[],[],[],"MoneThina",{},{}];
    keys.forEach((k,i)=>{
      if(!localStorage.getItem(k)){
        idbLoad(k, defaults[i]).then(v=>{ if(v && (Array.isArray(v)?v.length>0:Object.keys(v).length>0 || typeof v==="string")) setters[i](v); });
      }
    });
  },[]);

  // Forms
  const emptyTx  = {type:"expense",amount:"",category:"",tag:"",note:"",date:today.toISOString().slice(0,10)};
  const emptyRec = {type:"expense",amount:"",category:"",tag:"",note:"",frequency:"month",interval:1,dayOfMonth:1,startDate:today.toISOString().slice(0,10)};
  const emptyGoal= {name:"",color:GOAL_COLORS[0],target:"",monthlyAmount:"",monthlyDay:1,monthlyInterval:1,monthlyFrequency:"month",autoMonthly:false,paused:false};

  const [txForm,    setTxForm]    = useState(emptyTx);
  const [recForm,   setRecForm]   = useState(emptyRec);
  const [goalForm,  setGoalForm]  = useState(emptyGoal);
  const [editingRec,  setEditingRec]  = useState(null);
  const [editingTx,   setEditingTx]   = useState(null);
  const [editingGoal, setEditingGoal] = useState(null);
  const [confirmRec,  setConfirmRec]  = useState(null);
  const [depositGoal, setDepositGoal] = useState(null);
  const [confirmPreview, setConfirmPreview] = useState(null); // ricorrente previsto da confermare
  // FAB mode: "tx" | "rec"
  const [fabMode, setFabMode] = useState(null);

  // ── Auto-add recurring ──
  useEffect(()=>{
    const todayD = today.getDate();
    const nowKey = `${today.getFullYear()}-${today.getMonth()}`;

    // Ricorrenti normali
    recurring.filter(r=>!r.paused).forEach(rec=>{
      const startDate = rec.startDate ? new Date(rec.startDate) : null;
      // Non inserire se la data di inizio è nel futuro
      if(startDate && startDate > today) return;
      const shouldFire = shouldFireToday(rec, today);
      if(shouldFire){
        const exists=transactions.some(t=>t.recurringId===rec.id&&t.recurringMonth===nowKey);
        if(!exists){
          setTransactions(prev=>[...prev,{id:uid(),recurringId:rec.id,recurringMonth:nowKey,
            type:rec.type,amount:Number(rec.amount),category:rec.category,
            tag:rec.tag,note:rec.note,date:today.toISOString().slice(0,10)}]);
        }
      }
    });

    // Obiettivi automatici
    goals.filter(g=>g.autoMonthly&&g.monthlyAmount>0&&!g.paused).forEach(g=>{
      const interval = g.monthlyInterval||1;
      const freq = g.monthlyFrequency||"month";
      let shouldFire = false;
      if(freq==="week"){
        const weeksSinceEpoch = Math.floor(today.getTime()/(7*24*3600*1000));
        shouldFire = weeksSinceEpoch % interval === 0 && today.getDay() === (g.monthlyDay % 7);
      } else {
        shouldFire = today.getDate() === g.monthlyDay && today.getMonth() % interval === 0;
      }
      if(shouldFire){
        const exists=transactions.some(t=>t.goalId===g.id&&t.recurringMonth===nowKey);
        if(!exists){
          setTransactions(prev=>[...prev,{id:uid(),goalId:g.id,recurringMonth:nowKey,
            type:"expense",amount:Number(g.monthlyAmount),category:"Obiettivi",
            tag:g.name,note:`🎯 ${g.name}`,date:today.toISOString().slice(0,10)}]);
          setGoals(prev=>prev.map(gg=>gg.id===g.id?{...gg,saved:(gg.saved||0)+Number(g.monthlyAmount)}:gg));
        }
      }
    });
  },[]);

  function shouldFireToday(rec, date) {
    const d = date.getDate();
    const interval = rec.interval||1;
    const sd = rec.startDate ? new Date(rec.startDate) : date;
    if(rec.frequency==="week"){
      const weeksSinceEpoch = Math.floor(date.getTime()/(7*24*3600*1000));
      const startWeek = Math.floor(sd.getTime()/(7*24*3600*1000));
      return (weeksSinceEpoch - startWeek) % interval === 0 && date.getDay() === (rec.dayOfMonth % 7);
    }
    // Calcola mesi da startDate
    const sdMonthAbs = sd.getFullYear()*12 + sd.getMonth();
    const nowMonthAbs = date.getFullYear()*12 + date.getMonth();
    const monthsFromStart = nowMonthAbs - sdMonthAbs;
    return d === rec.dayOfMonth && monthsFromStart >= 0 && monthsFromStart % interval === 0;
  }

  // ── Computed ──
  const monthTx = transactions.filter(t=>{ const d=new Date(t.date); return d.getMonth()===month&&d.getFullYear()===year; });
  const totalIncome  = monthTx.filter(t=>t.type==="income").reduce((s,t)=>s+t.amount,0);
  const totalExpense = monthTx.filter(t=>t.type==="expense").reduce((s,t)=>s+t.amount,0);
  const balance = totalIncome - totalExpense;

  // Spese per categoria (con colore assegnato)
  const expByCat = {};
  monthTx.filter(t=>t.type==="expense").forEach(t=>{ 
    const k=t.category||"Altro";
    if(!expByCat[k]) expByCat[k]={value:0,tags:{}};
    expByCat[k].value+=t.amount;
    if(t.tag) expByCat[k].tags[t.tag]=(expByCat[k].tags[t.tag]||0)+t.amount;
  });
  const pieData = Object.entries(expByCat).map(([label,d],i)=>({
    label, value:d.value, tags:d.tags, color:PIE_COLORS[i%PIE_COLORS.length]
  }));

  const pieDataInEx = [
    ...(totalExpense>0?[{label:"Uscite",value:totalExpense,color:C.expense}]:[]),
    ...(totalIncome>0?[{label:"Entrate",value:totalIncome,color:C.income}]:[]),
  ];

  // Ricorrenti previsti per il mese visualizzato (non ancora scattati)
  const isFutureOrCurrent = year > today.getFullYear() || (year === today.getFullYear() && month >= today.getMonth());
  const recurringPreview = isFutureOrCurrent ? recurring.filter(r => {
    if(r.paused) return false;
    // Non mostrare se startDate è dopo il mese visualizzato
    const sd = r.startDate ? new Date(r.startDate) : today;
    const sdMonthAbs = sd.getFullYear()*12 + sd.getMonth();
    const viewMonthAbs = year*12 + month;
    if(sdMonthAbs > viewMonthAbs) return false;
    const nowKey = `${year}-${month}`;
    const alreadyInserted = transactions.some(t => t.recurringId===r.id && t.recurringMonth===nowKey);
    if(alreadyInserted) return false;
    const interval = r.interval||1;
    if(r.frequency==="week") return true;
    // Calcola da startDate come base, non da oggi
    const monthsFromStart = viewMonthAbs - sdMonthAbs;
    const firesThisMonth = monthsFromStart % interval === 0;
    if(!firesThisMonth) return false;
    if(year === today.getFullYear() && month === today.getMonth()){
      return Number(r.dayOfMonth) > today.getDate();
    }
    return true;
  }) : [];

  const previewIncome  = recurringPreview.filter(r=>r.type==="income").reduce((s,r)=>s+Number(r.amount),0);
  const previewExpense = recurringPreview.filter(r=>r.type==="expense").reduce((s,r)=>s+Number(r.amount),0);
  const forecastBalance = balance + previewIncome - previewExpense;

  const annualData = Array.from({length:12},(_,i)=>{
    const inc=transactions.filter(t=>{const d=new Date(t.date);return d.getFullYear()===year&&d.getMonth()===i&&t.type==="income";}).reduce((s,t)=>s+t.amount,0);
    const exp=transactions.filter(t=>{const d=new Date(t.date);return d.getFullYear()===year&&d.getMonth()===i&&t.type==="expense";}).reduce((s,t)=>s+t.amount,0);
    return {month:MONTHS[i].slice(0,3),inc,exp,bal:inc-exp};
  });

  // ── Swipe ──
  const touchX = useRef(null);
  const onTouchStart = e=>{ touchX.current=e.touches[0].clientX; };
  const onTouchEnd = e=>{
    if(touchX.current===null) return;
    const dx=e.changedTouches[0].clientX-touchX.current;
    if(Math.abs(dx)>50){
      if(dx<0){ if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1); }
      else { if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1); }
    }
    touchX.current=null;
  };
  const prevMonth = () => { if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1); };
  const nextMonth = () => { if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1); };

  // ── Actions ──
  const addTx = () => {
    if(!txForm.amount||isNaN(txForm.amount)) return;
    if(editingTx){
      setTransactions(prev=>prev.map(t=>t.id===editingTx.id?{...txForm,id:t.id,amount:Number(txForm.amount)}:t));
      setEditingTx(null);
    } else {
      setTransactions(prev=>[...prev,{...txForm,id:uid(),amount:Number(txForm.amount)}]);
    }
    setTxForm(emptyTx); setModal(null);
  };

  const fireRecurringNow = (rec, recId) => {
    const startDate = rec.startDate ? new Date(rec.startDate) : today;
    // Non inserire se la data di inizio è nel futuro
    if(startDate > today) return;
    const startKey = `${startDate.getFullYear()}-${startDate.getMonth()}`;
    const nowKey = `${today.getFullYear()}-${today.getMonth()}`;
    // Usa il mese di start come chiave se siamo nello stesso mese
    const recurringMonth = startKey;
    const day = Number(rec.dayOfMonth)||1;
    const shouldInsertNow = rec.frequency==="week" || day <= today.getDate();
    if(shouldInsertNow){
      const exists = transactions.some(t=>t.recurringId===recId&&t.recurringMonth===recurringMonth);
      if(!exists) setTransactions(prev=>[...prev,{
        id:uid(), recurringId:recId, recurringMonth,
        type:rec.type, amount:Number(rec.amount), category:rec.category,
        tag:rec.tag, note:rec.note,
        date: startDate <= today ? today.toISOString().slice(0,10) : rec.startDate
      }]);
    }
  };

  const addRec = () => {
    if(!recForm.amount||isNaN(recForm.amount)) return;
    if(editingRec){
      setRecurring(prev=>prev.map(r=>r.id===editingRec.id?{...recForm,id:r.id,amount:Number(recForm.amount)}:r));
      setEditingRec(null);
    } else {
      const newId = uid();
      const nr = {...recForm, id:newId, amount:Number(recForm.amount), interval:Number(recForm.interval)||1, dayOfMonth:Number(recForm.dayOfMonth)||1};
      setRecurring(prev=>[...prev, nr]);
      fireRecurringNow(nr, newId);
    }
    setRecForm(emptyRec); setModal(null);
  };

  const addGoal = () => {
    if(!goalForm.name) return;
    if(editingGoal){
      setGoals(prev=>prev.map(g=>g.id===editingGoal.id?{...goalForm,id:g.id,saved:g.saved,
        target:goalForm.target?Number(goalForm.target):null,
        monthlyAmount:Number(goalForm.monthlyAmount||0)}:g));
      setEditingGoal(null);
    } else {
      setGoals(prev=>[...prev,{...goalForm,id:uid(),saved:0,
        target:goalForm.target?Number(goalForm.target):null,
        monthlyAmount:Number(goalForm.monthlyAmount||0)}]);
    }
    setGoalForm(emptyGoal); setModal(null);
  };

  const doDeposit = () => {
    if(!depositGoal?.amount||isNaN(depositGoal.amount)) return;
    const amt=Number(depositGoal.amount);
    setTransactions(prev=>[...prev,{id:uid(),goalId:depositGoal.goal.id,type:"expense",amount:amt,category:"Obiettivi",
      tag:depositGoal.goal.name,note:`🎯 ${depositGoal.goal.name}`,date:today.toISOString().slice(0,10)}]);
    setGoals(prev=>prev.map(g=>g.id===depositGoal.goal.id?{...g,saved:(g.saved||0)+amt}:g));
    setDepositGoal(null); setModal(null);
  };

  // Annulla versamento automatico di un mese per un obiettivo
  const undoGoalMonth = (goal) => {
    const nowKey=`${today.getFullYear()}-${today.getMonth()}`;
    const tx=transactions.find(t=>t.goalId===goal.id&&t.recurringMonth===nowKey);
    if(tx){
      setTransactions(prev=>prev.filter(t=>t.id!==tx.id));
      setGoals(prev=>prev.map(g=>g.id===goal.id?{...g,saved:Math.max(0,(g.saved||0)-tx.amount)}:g));
    }
  };

  const toggleGoalPause = (goal) => {
    setGoals(prev=>prev.map(g=>g.id===goal.id?{...g,paused:!g.paused}:g));
  };

  const confirmEditOnce = () => {
    setTransactions(prev=>prev.map(t=>t.id===confirmRec.tx.id?{...t,
      amount:Number(confirmRec.newAmount||t.amount),
      category:confirmRec.newCategory!==undefined?confirmRec.newCategory:t.category,
      tag:confirmRec.newTag!==undefined?confirmRec.newTag:t.tag,
      note:confirmRec.newNote!==undefined?confirmRec.newNote:t.note}:t));
    setConfirmRec(null); setModal(null);
  };
  const confirmEditAll = () => {
    const rec=recurring.find(r=>r.id===confirmRec.tx.recurringId);
    if(rec) setRecurring(prev=>prev.map(r=>r.id===rec.id?{...r,
      amount:Number(confirmRec.newAmount||r.amount),
      category:confirmRec.newCategory!==undefined?confirmRec.newCategory:r.category,
      tag:confirmRec.newTag!==undefined?confirmRec.newTag:r.tag,
      note:confirmRec.newNote!==undefined?confirmRec.newNote:r.note}:r));
    setConfirmRec(null); setModal(null);
  };
  const deleteRecTx = () => {
    setTransactions(prev=>prev.filter(t=>t.id!==confirmRec.tx.id));
    setConfirmRec(null); setModal(null);
  };

  // Elimina transazione — se è un versamento obiettivo aggiorna anche il saved
  const deleteTx = (tx) => {
    setTransactions(prev=>prev.filter(t=>t.id!==tx.id));
    if(tx.goalId){
      setGoals(prev=>prev.map(g=>g.id===tx.goalId?{...g,saved:Math.max(0,(g.saved||0)-tx.amount)}:g));
    }
  };
  const FAB = () => (
    <button onClick={()=>{setTxForm(emptyTx);setEditingTx(null);setModal("addTx");}} style={{
      position:"fixed",bottom:88,right:20,
      width:62,height:62,borderRadius:"50%",background:C.sage,border:"none",
      boxShadow:"0 4px 22px rgba(141,184,138,0.6)",cursor:"pointer",
      display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,
    }}>
      <span style={{color:"#fff",fontSize:30,lineHeight:1,marginTop:-2}}>+</span>
    </button>
  );

  // ── BOTTOM NAV ──
  const Nav = () => (
    <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:C.card,borderTop:`1px solid ${C.border}`,display:"flex",padding:"8px 0 14px",zIndex:99}}>
      {[["home","🏠","Home"],["goals","🎯","Obiettivi"],["annual","📊","Anno"],["manage","⚙️","Gestione"]].map(([k,icon,label])=>(
        <button key={k} onClick={()=>setTab(k)} style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,color:tab===k?C.sage:C.muted,fontFamily:"inherit",padding:0}}>
          <span style={{fontSize:22}}>{icon}</span>
          <span style={{fontSize:10,fontWeight:tab===k?700:400}}>{label}</span>
        </button>
      ))}
    </div>
  );

  // ─────────────────────────────────────────────────────────────────────────
  return (
    <div style={{fontFamily:"'DM Sans',sans-serif",background:C.bg,minHeight:"100vh",maxWidth:480,margin:"0 auto",paddingBottom:90}}>
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>

      {/* HEADER */}
      {(()=>{
        const noteKey=`${year}-${month}`;
        const hasNote=!!monthNotes[noteKey];
        const headerBg = balance>0
          ? `linear-gradient(135deg, #6AAF66 0%, #4A9A46 100%)`
          : balance<0
          ? `linear-gradient(135deg, #C47A7A 0%, #A85E5E 100%)`
          : `linear-gradient(135deg, ${C.sage} 0%, #6FA86C 100%)`;
        return (
          <div style={{background:headerBg,padding:"22px 20px 18px",borderRadius:"0 0 28px 28px",transition:"background 0.5s"}}>
            <div style={{color:"rgba(255,255,255,0.7)",fontSize:11,fontWeight:500,marginBottom:3}}>Le mie finanze</div>
            <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between"}}>
              <div style={{color:"#fff",fontSize:26,fontWeight:700}}>💰 {appName}</div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                {/* Freccia vs mese scorso */}
                {(()=>{
                  const prevM=month===0?11:month-1;
                  const prevY=month===0?year-1:year;
                  const prevInc=transactions.filter(t=>{const d=new Date(t.date);return d.getMonth()===prevM&&d.getFullYear()===prevY&&t.type==="income";}).reduce((s,t)=>s+t.amount,0);
                  const prevExp=transactions.filter(t=>{const d=new Date(t.date);return d.getMonth()===prevM&&d.getFullYear()===prevY&&t.type==="expense";}).reduce((s,t)=>s+t.amount,0);
                  const prevBal=prevInc-prevExp;
                  const diff=balance-prevBal;
                  if(prevBal===0&&balance===0) return null;
                  return (
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:18,color:"#fff"}}>{diff>=0?"↑":"↓"}</div>
                      <div style={{fontSize:11,color:"rgba(255,255,255,0.85)",fontWeight:600}}>{diff>=0?"+":""}{fmt(diff)}€ vs scorso</div>
                    </div>
                  );
                })()}
              </div>
            </div>
            </div>
          );
        })()}


      {/* ══ HOME ══ */}
      {tab==="home" && (
        <div onTouchStart={onTouchStart} onTouchEnd={onTouchEnd} style={{padding:"0 16px"}}>
          {/* Month nav */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 4px 8px"}}>
            <button onClick={prevMonth} style={{background:C.card,border:"none",width:34,height:34,borderRadius:"50%",cursor:"pointer",fontSize:18,color:C.sage,boxShadow:"0 1px 6px rgba(0,0,0,0.08)"}}>‹</button>
            <button onClick={()=>setMonthPickerOpen(true)} style={{fontWeight:700,fontSize:17,color:C.text,background:"none",border:"none",cursor:"pointer",fontFamily:"inherit"}}>
              {MONTHS[month]} {year} ▾
            </button>
            <button onClick={nextMonth} style={{background:C.card,border:"none",width:34,height:34,borderRadius:"50%",cursor:"pointer",fontSize:18,color:C.sage,boxShadow:"0 1px 6px rgba(0,0,0,0.08)"}}>›</button>
          </div>

          {/* Month picker */}
          {monthPickerOpen && (
            <>
              <div style={{position:"fixed",inset:0,zIndex:50}} onClick={()=>setMonthPickerOpen(false)}/>
              <div style={{background:C.card,borderRadius:18,padding:16,marginBottom:10,boxShadow:"0 4px 20px rgba(0,0,0,0.12)",position:"relative",zIndex:51}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                <button onClick={()=>setYear(y=>y-1)} style={{background:"none",border:"none",fontSize:16,color:C.sage,cursor:"pointer"}}>‹</button>
                <span style={{fontWeight:700,fontSize:15,color:C.text}}>{year}</span>
                <button onClick={()=>setYear(y=>y+1)} style={{background:"none",border:"none",fontSize:16,color:C.sage,cursor:"pointer"}}>›</button>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>
                {MONTHS.map((m,i)=>(
                  <button key={i} onClick={()=>{setMonth(i);setMonthPickerOpen(false);}}
                    style={{padding:"8px 4px",border:"none",borderRadius:10,fontFamily:"inherit",fontSize:12,fontWeight:600,cursor:"pointer",
                      background:month===i?C.sage:C.border,
                      color:month===i?C.card:C.text}}>
                    {m.slice(0,3)}
                  </button>
                ))}
              </div>
              </div>
            </>
          )}

          {/* Balance */}
          <div style={{background:C.card,borderRadius:22,padding:20,marginBottom:14,boxShadow:"0 2px 18px rgba(0,0,0,0.06)"}}>
            <div style={{color:C.muted,fontSize:12,marginBottom:4}}>Bilancio del mese</div>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{fontSize:34,fontWeight:700,color:balance>=0?C.balanceGreen:C.expense,letterSpacing:-1}}>{balance>=0?"+":""}{fmt(balance)} €</div>
              <button onClick={()=>setModal("monthNote")} style={{background:"none",border:"none",cursor:"pointer",fontSize:20,opacity:monthNotes[`${year}-${month}`]?1:0.3,padding:0,lineHeight:1}}>📝</button>
            </div>
            {recurringPreview.length>0 && (
              <div style={{marginTop:6,display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontSize:11,color:C.muted}}>Previsto:</span>
                <span style={{fontSize:13,fontWeight:600,color:(forecastBalance>=0?C.balanceGreen:C.expense),opacity:0.65}}>
                  {forecastBalance>=0?"+":""}{fmt(forecastBalance)} €
                </span>
                <span style={{fontSize:10,color:C.muted,opacity:0.7}}>({recurringPreview.length} ricorrenti attesi)</span>
              </div>
            )}
            <div style={{display:"flex",gap:10,marginTop:14}}>
              <div style={{flex:1,background:"#F2F9F2",borderRadius:14,padding:"11px 14px"}}>
                <div style={{fontSize:11,color:C.muted,marginBottom:2}}>Entrate</div>
                <div style={{fontWeight:700,color:C.sageDark,fontSize:16}}>+{fmt(totalIncome)} €</div>
                {previewIncome>0&&<div style={{fontSize:10,color:C.sageDark,opacity:0.5,marginTop:2}}>+{fmt(previewIncome)} € attesi</div>}
              </div>
              <div style={{flex:1,background:"#FDF2F2",borderRadius:14,padding:"11px 14px"}}>
                <div style={{fontSize:11,color:C.muted,marginBottom:2}}>Uscite</div>
                <div style={{fontWeight:700,color:C.expense,fontSize:16}}>-{fmt(totalExpense)} €</div>
                {previewExpense>0&&<div style={{fontSize:10,color:C.expense,opacity:0.5,marginTop:2}}>-{fmt(previewExpense)} € attesi</div>}
              </div>
            </div>
          </div>

          {/* Pie + Sankey */}
          {(pieData.length>0||totalIncome>0) && (
            <div style={{background:C.card,borderRadius:22,padding:20,marginBottom:14,boxShadow:"0 2px 18px rgba(0,0,0,0.06)"}}>
              <div style={{display:"flex",gap:6,marginBottom:16}}>
                {["Spese","Sankey"].map((label,i)=>(
                  <button key={i} onClick={()=>{if(i===1){setModal("sankey");}else{setPieView(0);}}} style={{flex:1,padding:"7px 8px",border:"none",borderRadius:10,fontFamily:"inherit",fontWeight:600,fontSize:12,cursor:"pointer",background:i===0&&pieView===0?C.sage:C.border,color:i===0&&pieView===0?"#fff":C.muted}}>{label}</button>
                ))}
              </div>
              {pieData.length===0
                ? <div style={{textAlign:"center",color:C.muted,fontSize:13,padding:"20px 0"}}>Nessuna spesa questo mese</div>
                : <div style={{display:"flex",justifyContent:"center"}}>
                    <PieChart data={pieData} size={280} centerLabel="Totale spese" centerValue={fmt(totalExpense)+"€"} onSliceClick={s=>setSelectedSlice(s)}/>
                  </div>
              }
            </div>
          )}

          {/* Transactions */}
          <div style={{background:C.card,borderRadius:22,padding:20,marginBottom:14,boxShadow:"0 2px 18px rgba(0,0,0,0.06)"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:searchQuery||searchOpen?12:14}}>
              <span style={{fontWeight:700,fontSize:14,color:C.text,flex:1}}>Movimenti</span>
              {searchOpen
                ? <div style={{display:"flex",gap:6,flex:1,alignItems:"center"}}>
                    <input autoFocus style={{...inp,fontSize:13,marginBottom:0,flex:1,padding:"8px 12px"}}
                      placeholder="Cerca..." value={searchQuery} onChange={e=>setSearchQuery(e.target.value)}/>
                    <button onClick={()=>{setSearchOpen(false);setSearchQuery("");}} style={{background:"none",border:"none",fontSize:16,cursor:"pointer",color:C.muted,padding:2,flexShrink:0}}>✕</button>
                  </div>
                : <button onClick={()=>setSearchOpen(true)} style={{background:"none",border:"none",fontSize:18,cursor:"pointer",color:C.muted,padding:2}}>🔍</button>
              }
            </div>
            {searchQuery.trim() && (
              <div style={{display:"flex",gap:6,marginBottom:12}}>
                {[["month","Questo mese"],["all","Tutti"]].map(([s,l])=>(
                  <button key={s} onClick={()=>setSearchScope(s)} style={{padding:"5px 13px",borderRadius:14,border:"none",fontFamily:"inherit",fontSize:12,fontWeight:600,cursor:"pointer",background:searchScope===s?C.sage:C.border,color:searchScope===s?"#fff":C.muted}}>{l}</button>
                ))}
              </div>
            )}
            {(()=>{
              const q = searchQuery.trim().toLowerCase();
              const pool = q && searchScope==="all" ? transactions : monthTx;
              const filtered = q
                ? pool.filter(t=>
                    !t.skipped && (
                    (t.category||"").toLowerCase().includes(q) ||
                    (t.tag||"").toLowerCase().includes(q) ||
                    (t.note||"").toLowerCase().includes(q) ||
                    String(t.amount).includes(q))
                  )
                : monthTx.filter(t=>!t.skipped);
              const showPreview = !q;

              if(filtered.length===0 && (!showPreview || recurringPreview.length===0))
                return <div style={{textAlign:"center",color:C.muted,padding:"20px 0",fontSize:14}}>
                  {q ? "Nessun risultato 🔍" : "Nessun movimento 🌿"}<br/>
                  {!q && <span style={{fontSize:12}}>Premi + per aggiungere</span>}
                </div>;

              return <>
                {[...filtered].sort((a,b)=>new Date(b.date)-new Date(a.date)).map(tx=>(
                <div key={tx.id} style={{display:"flex",alignItems:"center",gap:12,padding:"11px 0",borderBottom:`1px solid ${C.border}`,cursor:"pointer"}} onClick={()=>{
                  if(tx.recurringId){ setConfirmRec({tx,newAmount:"",newNote:"",newCategory:undefined,newTag:undefined});setModal("confirmRec"); }
                  else { setEditingTx(tx);setTxForm({type:tx.type,amount:String(tx.amount),category:tx.category||"",tag:tx.tag||"",note:tx.note||"",date:tx.date});setModal("addTx"); }
                }}>
                  <div style={{width:38,height:38,borderRadius:12,background:tx.type==="income"?"#F2F9F2":"#FDF2F2",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,flexShrink:0}}>
                    {tx.goalId?"🎯":tx.type==="income"?"⬆️":"⬇️"}
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:700,fontSize:14,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{tx.category||"—"}</div>
                    {tx.tag&&<div style={{fontSize:11,color:C.muted,marginTop:1}}>{tx.tag}</div>}
                    <div style={{fontSize:11,color:"#BBB",marginTop:1}}>{tx.note?`${tx.note} · `:""}{new Date(tx.date).toLocaleDateString("it-IT")} {tx.recurringId?"🔁":""}</div>
                  </div>
                  <div style={{fontWeight:700,color:tx.type==="income"?C.sageDark:C.expense,fontSize:14,flexShrink:0}}>
                    {tx.type==="income"?"+":"-"}{fmt(tx.amount)}€
                  </div>
                  {!tx.recurringId&&(
                    <button onClick={e=>{e.stopPropagation();deleteTx(tx);}} style={{background:"none",border:"none",fontSize:13,cursor:"pointer",color:C.muted,padding:4,flexShrink:0}}>✕</button>
                  )}
                </div>
                ))}
                {showPreview && recurringPreview.length>0&&(
                  <>
                    <div style={{fontSize:11,color:C.muted,padding:"10px 0 4px",textAlign:"center",letterSpacing:0.5}}>— PREVISTI —</div>
                    {recurringPreview.map(r=>(
                      <div key={r.id} onClick={()=>{setConfirmPreview({rec:r, amount:String(r.amount), note:r.note||""});setModal("confirmPreview");}}

                {catTags.length>0&&(
                  <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}}>
                    <button onClick={()=>{setTrendTag("");setTrendTooltip(null);}} style={{padding:"4px 10px",borderRadius:14,border:"none",fontFamily:"inherit",fontSize:11,fontWeight:600,cursor:"pointer",background:trendTag===""?catColor:C.border,color:trendTag===""?"#fff":C.muted}}>Tutti</button>
                    {catTags.map(t=>(
                      <button key={t} onClick={()=>{setTrendTag(trendTag===t?"":t);setTrendTooltip(null);}} style={{padding:"4px 10px",borderRadius:14,border:"none",fontFamily:"inherit",fontSize:11,fontWeight:600,cursor:"pointer",background:trendTag===t?catColor:C.border,color:trendTag===t?"#fff":C.muted}}>{t}</button>
                    ))}
                  </div>
                )}
                {/* Grafico linee SVG */}
                {(()=>{
                  const YLABELS = 3;
                  const yVals = Array.from({length:YLABELS},(_,i)=>Math.round((maxVal/(YLABELS-1))*i));
                  const LPAD = 42; // spazio a sinistra per le label Y
                  return (
                    <svg width="100%" viewBox={`0 0 ${W+LPAD} ${H+20}`} style={{overflow:"visible"}}>
                      {/* Griglie orizzontali e label Y */}
                      {yVals.map((v,i)=>{
                        const cy = H - PAD - ((v/maxVal)*(H-PAD*2));
                        return (
                          <g key={i}>
                            <line x1={LPAD} y1={cy} x2={W+LPAD-PAD} y2={cy} stroke={C.border} strokeWidth={1}/>
                            <text x={LPAD-4} y={cy+4} textAnchor="end" fontSize={8} fill={C.muted} fontFamily="DM Sans">
                              {v>=1000?`${(v/1000).toFixed(1)}k`:v}€
                            </text>
                          </g>
                        );
                      })}
                      {/* Linea media */}
                      {avg>0&&<line x1={LPAD} y1={H-PAD-((avg/maxVal)*(H-PAD*2))} x2={W+LPAD-PAD} y2={H-PAD-((avg/maxVal)*(H-PAD*2))} stroke={catColor} strokeDasharray="4,3" strokeWidth={1} opacity={0.45}/>}
                      {/* Area */}
                      {pathD&&<path
                        d={pathD.replace(/M(\S+),/,`M${parseFloat(pathD.split("M")[1])+LPAD},`).replace(/L(\d+\.?\d*),/g,(_,x)=>`L${parseFloat(x)+LPAD},`)}
                        fill="none" stroke="none"/>}
                      {/* Area e linea con offset X */}
                      {(()=>{
                        const shiftedPts = pts.map(p=>({...p, x:p.x+LPAD}));
                        const sPathD = shiftedPts.filter(p=>p.y!==null).reduce((acc,p,i)=> i===0?`M${p.x},${p.y}`:`${acc} L${p.x},${p.y}`,"");
                        const first = shiftedPts.filter(p=>p.y!==null)[0];
                        const last  = shiftedPts.filter(p=>p.y!==null).slice(-1)[0];
                        return <>
                          {sPathD&&<path d={`${sPathD} L${last?.x},${H-PAD} L${first?.x},${H-PAD} Z`} fill={catColor} opacity={0.1}/>}
                          {sPathD&&<path d={sPathD} fill="none" stroke={catColor} strokeWidth={2.5} strokeLinecap="round" strokeLinejoin="round"/>}
                          {shiftedPts.map((p,i)=>(
                            <g key={i} style={{cursor:"pointer"}} onClick={()=>setTrendTooltip(trendTooltip===i?null:i)}>
                              {p.y!==null&&<circle cx={p.x} cy={p.y} r={trendTooltip===i?5:3.5} fill={catColor} stroke="#fff" strokeWidth={1.5}/>}
                              {p.y!==null&&trendTooltip===i&&(
                                <g>
                                  <rect x={p.x-22} y={p.y-26} width={44} height={18} rx={5} fill={catColor} opacity={0.92}/>
                                  <text x={p.x} y={p.y-13} textAnchor="middle" fontSize={9} fontWeight="700" fill="#fff" fontFamily="DM Sans">{fmt(p.val)}€</text>
                                </g>
                              )}
                              <text x={p.x} y={H+14} textAnchor="middle" fontSize={8} fill={C.muted} fontFamily="DM Sans">{p.label}</text>
                            </g>
                          ))}
                        </>;
                      })()}
                    </svg>
                  );
                })()}
                {/* Stats */}
                <div style={{display:"flex",gap:10,marginTop:8}}>
                  <div style={{flex:1,background:C.bg,borderRadius:12,padding:"8px 12px"}}>
                    <div style={{fontSize:10,color:C.muted}}>Media mensile</div>
                    <div style={{fontSize:14,fontWeight:700,color:C.text}}>{fmt(avg)}€</div>
                  </div>
                  <div style={{flex:1,background:C.bg,borderRadius:12,padding:"8px 12px"}}>
                    <div style={{fontSize:10,color:C.muted}}>Totale anno</div>
                    <div style={{fontSize:14,fontWeight:700,color:C.text}}>{fmt(trendData.reduce((s,d)=>s+d.val,0))}€</div>
                  </div>
                  <div style={{flex:1,background:C.bg,borderRadius:12,padding:"8px 12px"}}>
                    <div style={{fontSize:10,color:C.muted}}>Mese più alto</div>
                    <div style={{fontSize:14,fontWeight:700,color:C.text}}>{MONTHS[trendData.indexOf(trendData.reduce((a,b)=>a.val>b.val?a:b))].slice(0,3)}</div>
                  </div>
                </div>
              </div>
            );
          })()}
        </div>
      )}

      {/* ══ MANAGE ══ */}
      {tab==="manage" && (
        <div style={{padding:"0 16px"}}>
          <div style={{padding:"12px 4px 14px",fontWeight:700,fontSize:17,color:C.text}}>Gestione</div>

          {/* Nome app */}
          <div style={{background:C.card,borderRadius:22,padding:20,marginBottom:14,boxShadow:"0 2px 18px rgba(0,0,0,0.06)"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div style={{fontSize:16,fontWeight:700,color:C.sage}}>{appName}</div>
              <button onClick={()=>setModal("editName")} style={{background:C.bg,border:`1.5px solid ${C.border}`,borderRadius:12,padding:"8px 16px",fontWeight:600,fontFamily:"inherit",fontSize:13,cursor:"pointer",color:C.text}}>
                Modifica
              </button>
            </div>
          </div>
          <div style={{background:C.card,borderRadius:22,padding:20,marginBottom:14,boxShadow:"0 2px 18px rgba(0,0,0,0.06)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <span style={{fontWeight:700,fontSize:14,color:C.text}}>🔁 Ricorrenti</span>
              <button onClick={()=>{setRecForm(emptyRec);setEditingRec(null);setModal("addRec");}} style={{background:C.honey,color:C.text,border:"none",borderRadius:12,padding:"7px 13px",fontWeight:600,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>+ Nuova</button>
            </div>
            {recurring.length===0
              ? <div style={{color:C.muted,fontSize:13}}>Nessuna voce ricorrente</div>
              : recurring.map(r=>(
                <div key={r.id} style={{display:"flex",alignItems:"center",padding:"9px 0",borderBottom:`1px solid ${C.border}`}}>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:600,fontSize:13,color:C.text}}>{r.category||"—"}{r.tag?` · ${r.tag}`:""}</div>
                    <div style={{fontSize:11,color:C.muted}}>Ogni {r.interval||1} {FREQ_OPTIONS.find(f=>f.value===r.frequency)?.label||"mese/i"} (giorno {r.dayOfMonth}) · {r.type==="income"?"+":"-"}{fmt(r.amount)}€{r.note?` · ${r.note}`:""}</div>
                  </div>
                  <button onClick={()=>{setEditingRec(r);setRecForm({...r,amount:String(r.amount)});setModal("addRec");}} style={{background:"none",border:"none",fontSize:15,cursor:"pointer",padding:"0 6px"}}>✏️</button>
                  <button onClick={()=>setRecurring(prev=>prev.filter(x=>x.id!==r.id))} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",padding:"0 4px"}}>✕</button>
                </div>
              ))
            }
          </div>
          <div style={{background:C.card,borderRadius:22,padding:20,marginBottom:14,boxShadow:"0 2px 18px rgba(0,0,0,0.06)"}}>
            <div style={{fontWeight:700,fontSize:14,color:C.text,marginBottom:12}}>📂 Categorie</div>
            {categories.length===0
              ? <div style={{color:C.muted,fontSize:13}}>Nessuna categoria — creale al volo quando inserisci un movimento!</div>
              : [...categories]
                  .sort((a,b)=>{
                    if(a.type!==b.type) return a.type==="income"?-1:1;
                    return a.name.localeCompare(b.name);
                  })
                  .map(c=>(
                <div key={c.id} style={{padding:"9px 0",borderBottom:`1px solid ${C.border}`}}>
                  <div style={{display:"flex",alignItems:"center"}}>
                    <div style={{flex:1}}>
                      <span style={{fontWeight:600,fontSize:13,color:C.text}}>{c.name}</span>
                      <span style={{fontSize:11,color:C.muted,marginLeft:8}}>{c.type==="income"?"entrata":"uscita"}</span>
                    </div>
                    <button onClick={()=>setCategories(prev=>prev.filter(x=>x.id!==c.id))} style={{background:"none",border:"none",color:C.muted,cursor:"pointer"}}>✕</button>
                  </div>
                  {c.tags?.length>0&&(
                    <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:6}}>
                      {c.tags.map(t=>(
                        <div key={t} style={{display:"flex",alignItems:"center",gap:4,background:C.border,borderRadius:16,padding:"3px 8px 3px 10px"}}>
                          <span style={{fontSize:12,color:C.text}}>{t}</span>
                          <button onClick={()=>setCategories(prev=>prev.map(x=>x.id===c.id?{...x,tags:x.tags.filter(tg=>tg!==t)}:x))}
                            style={{background:"none",border:"none",cursor:"pointer",color:C.muted,fontSize:12,padding:"0 0 0 2px",lineHeight:1}}>✕</button>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              ))
            }
          </div>

          {/* Backup — in fondo */}
          <div style={{background:C.card,borderRadius:22,padding:20,marginBottom:14,boxShadow:"0 2px 18px rgba(0,0,0,0.06)"}}>
            <div style={{fontWeight:700,fontSize:14,color:C.text,marginBottom:14}}>💾 Backup dati</div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>{
                const data={transactions,recurring,goals,categories,exportedAt:new Date().toISOString()};
                const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
                const url=URL.createObjectURL(blob);
                const a=document.createElement("a");
                a.href=url; a.download=`monethina-backup-${new Date().toISOString().slice(0,10)}.json`;
                a.click(); URL.revokeObjectURL(url);
              }} style={{flex:1,background:C.sage,color:"#fff",border:"none",borderRadius:14,padding:"13px",fontWeight:700,fontFamily:"inherit",fontSize:14,cursor:"pointer"}}>
                ⬇️ Esporta
              </button>
              <button onClick={()=>document.getElementById("import-input").click()}
                style={{flex:1,background:C.bg,color:C.text,border:`1.5px solid ${C.border}`,borderRadius:14,padding:"13px",fontWeight:700,fontFamily:"inherit",fontSize:14,cursor:"pointer"}}>
                ⬆️ Importa
              </button>
              <input id="import-input" type="file" accept=".json" style={{display:"none"}} onChange={e=>{
                const file=e.target.files[0]; if(!file) return;
                const reader=new FileReader();
                reader.onload=ev=>{
                  try {
                    const data=JSON.parse(ev.target.result);
                    if(data.transactions) setTransactions(data.transactions);
                    if(data.recurring) setRecurring(data.recurring);
                    if(data.goals) setGoals(data.goals);
                    if(data.categories) setCategories(data.categories);
                    alert("✅ Dati importati con successo!");
                  } catch { alert("❌ File non valido"); }
                };
                reader.readAsText(file);
                e.target.value="";
              }}/>
            </div>
            <div style={{fontSize:11,color:C.muted,marginTop:10,textAlign:"center"}}>
              Ogni esportazione crea un file con la data — tieni solo l'ultimo 🛡️
            </div>
          </div>
        </div>
      )}

      <FAB/>
      <Nav/>

      {/* ══ MODALS ══ */}

      {/* Movimento */}
      {modal==="addTx" && (
        <Modal title={editingTx?"Modifica movimento":"Nuovo movimento"} onClose={()=>{setModal(null);setEditingTx(null);setTxForm(emptyTx);}}>
          <div style={{display:"flex",gap:8,marginBottom:14}}>
            {["expense","income"].map(t=>(
              <button key={t} onClick={()=>setTxForm(f=>({...f,type:t,category:"",tag:""}))} style={{flex:1,padding:"11px",border:"none",borderRadius:14,fontWeight:600,fontFamily:"inherit",cursor:"pointer",fontSize:14,
                background:txForm.type===t?(t==="income"?"#6AAF66":"#D96060"):C.border,
                color:txForm.type===t?"#fff":C.muted}}>
                {t==="income"?"⬆️ Entrata":"⬇️ Uscita"}
              </button>
            ))}
          </div>
          <input style={{...inp,marginBottom:12}} type="number" placeholder="Importo €" value={txForm.amount} onChange={e=>setTxForm(f=>({...f,amount:e.target.value}))}/>
          <div style={{fontSize:12,color:C.muted,marginBottom:6}}>Categoria</div>
          <CategoryPicker categories={categories} setCategories={setCategories} type={txForm.type} value={txForm.category} onChange={v=>setTxForm(f=>({...f,category:v}))} tagValue={txForm.tag} onTagChange={v=>setTxForm(f=>({...f,tag:v}))}/>
          <input style={{...inp,marginBottom:12}} type="text" placeholder="Nota (opzionale)" value={txForm.note} onChange={e=>setTxForm(f=>({...f,note:e.target.value}))}/>
          <input style={{...inp,marginBottom:14}} type="date" value={txForm.date} onChange={e=>setTxForm(f=>({...f,date:e.target.value}))}/>
          {/* Toggle ricorrente */}
          {!editingTx && (
            <div style={{background:C.bg,borderRadius:14,padding:12,marginBottom:14}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:txForm.isRecurring?12:0}}>
                <span style={{fontSize:14,fontWeight:600,color:C.text}}>🔁 Ricorrente</span>
                <Toggle on={!!txForm.isRecurring} onToggle={()=>setTxForm(f=>({...f,isRecurring:!f.isRecurring,frequency:"month",interval:1,dayOfMonth:""}))}/>
              </div>
              {txForm.isRecurring && (
                <>
                  <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
                    <span style={{fontSize:13,color:C.muted,flexShrink:0}}>Ogni</span>
                    <input style={{...inp,width:52,padding:"9px 8px",textAlign:"center"}} type="number" min={1} placeholder="1" value={txForm.interval||""} onChange={e=>setTxForm(f=>({...f,interval:e.target.value===""?"":Number(e.target.value)}))}/>
                    <select style={{...inp,flex:1}} value={txForm.frequency||"month"} onChange={e=>setTxForm(f=>({...f,frequency:e.target.value}))}>
                      {FREQ_OPTIONS.map(f=><option key={f.value} value={f.value}>{f.label}</option>)}
                    </select>
                  </div>
                  <input style={{...inp}} type="number" min={1} max={31} placeholder="Giorno del mese (es. 1)" value={txForm.dayOfMonth||""} onChange={e=>setTxForm(f=>({...f,dayOfMonth:e.target.value===""?"":Number(e.target.value)}))}/>
                </>
              )}
            </div>
          )}
          {editingTx
            ? <div style={{display:"flex",gap:8}}>
                <button onClick={()=>{deleteTx(editingTx);setEditingTx(null);setTxForm(emptyTx);setModal(null);}} style={{background:"#FDF2F2",border:"none",borderRadius:14,padding:"13px 16px",fontSize:18,cursor:"pointer"}}>🗑️</button>
                <Btn onClick={addTx} style={{flex:1}}>Salva</Btn>
              </div>
            : <Btn onClick={()=>{
                if(!txForm.amount||isNaN(txForm.amount)) return;
                if(txForm.isRecurring){
                  const newId=uid();
                  const nr={type:txForm.type,amount:Number(txForm.amount),category:txForm.category,tag:txForm.tag,note:txForm.note,frequency:txForm.frequency||"month",interval:Number(txForm.interval)||1,dayOfMonth:Number(txForm.dayOfMonth)||1,startDate:txForm.date||today.toISOString().slice(0,10)};
                  setRecurring(prev=>[...prev,{...nr,id:newId}]);
                  fireRecurringNow(nr,newId);
                  setTxForm(emptyTx); setModal(null);
                } else { addTx(); }
              }}>Aggiungi</Btn>
          }
        </Modal>
      )}

      {/* Ricorrente */}
      {modal==="addRec" && (
        <Modal title={editingRec?"Modifica ricorrente":"Nuova voce ricorrente"} onClose={()=>setModal(null)}>
          <div style={{display:"flex",gap:8,marginBottom:14}}>
            {["expense","income"].map(t=>(
              <button key={t} onClick={()=>setRecForm(f=>({...f,type:t,category:"",tag:""}))} style={{flex:1,padding:"11px",border:"none",borderRadius:14,fontWeight:600,fontFamily:"inherit",cursor:"pointer",fontSize:14,background:recForm.type===t?(t==="income"?C.sage:C.rose):C.border,color:recForm.type===t?(t==="income"?"#fff":C.text):C.muted}}>
                {t==="income"?"⬆️ Entrata":"⬇️ Uscita"}
              </button>
            ))}
          </div>
          <input style={{...inp,marginBottom:12}} type="number" placeholder="Importo €" value={recForm.amount} onChange={e=>setRecForm(f=>({...f,amount:e.target.value}))}/>
          <div style={{fontSize:12,color:C.muted,marginBottom:6}}>Categoria</div>
          <CategoryPicker categories={categories} setCategories={setCategories} type={recForm.type} value={recForm.category} onChange={v=>setRecForm(f=>({...f,category:v}))} tagValue={recForm.tag} onTagChange={v=>setRecForm(f=>({...f,tag:v}))}/>
          <input style={{...inp,marginBottom:12}} type="text" placeholder="Nota (es. Affitto)" value={recForm.note} onChange={e=>setRecForm(f=>({...f,note:e.target.value}))}/>

            <select style={{...inp,flex:1,marginBottom:0}} value={recForm.frequency} onChange={e=>setRecForm(f=>({...f,frequency:e.target.value}))}>
